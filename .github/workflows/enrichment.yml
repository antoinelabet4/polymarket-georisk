name: Update Enrichment Data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Generate enrichment.json
        env:
          ACLED_EMAIL: ${{ secrets.ACLED_EMAIL }}
          ACLED_PASSWORD: ${{ secrets.ACLED_PASSWORD }}
          METACULUS_TOKEN: ${{ secrets.METACULUS_TOKEN }}
        run: node scripts/generate_enrichment.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add enrichment.json
          git diff --staged --quiet || git commit -m "Update enrichment [$(date -u +%Y-%m-%dT%H:%M)]"
          git push
